global:
  scrape_interval: 15s

scrape_configs:

  - job_name: event-gateway

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - event-gateway:8080

  - job_name: account-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - account-service:8081