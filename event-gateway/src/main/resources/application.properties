############################################
# Application
############################################

spring.application.name=event-gateway
server.port=8080

############################################
# Database
############################################

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eventledger}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################################
# JPA
############################################

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

############################################
# Account Service
############################################

account.service.url=${ACCOUNT_SERVICE_URL:http://localhost:8081}

############################################
# Swagger
############################################

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

############################################
# Actuator
############################################

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

############################################
# Prometheus
############################################

management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

############################################
# Logging
############################################

logging.level.root=INFO
logging.level.com.mphasis.assignment=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n